<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeDOC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="screen active">
    <div class="login-header">
      <div class="logo-icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="10" fill="#2563eb"/>
          <path d="M20 10C14.48 10 10 14.48 10 20s4.48 10 10 10 10-4.48 10-10S25.52 10 20 10zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H19v6l5.25 3.15.75-1.23-4.5-2.67V15z" fill="white"/>
        </svg>
      </div>
      <div class="logo-text">TimeDOC</div>
      <div class="subtitle">Time Tracking & Screen Recording</div>
    </div>
    <form id="login-form">
      <input type="hidden" id="server-url" value="http://109.205.181.13">
      <div class="input-group">
        <label>Username</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 8a3 3 0 100-6 3 3 0 000 6zm0 1.5c-3.33 0-6 1.34-6 3V14h12v-1.5c0-1.66-2.67-3-6-3z" fill="#94a3b8"/></svg>
          <input type="text" id="username" placeholder="Enter username" autofocus>
        </div>
      </div>
      <div class="input-group">
        <label>Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 6h-.5V4.5a3.5 3.5 0 10-7 0V6H4a1 1 0 00-1 1v6a1 1 0 001 1h8a1 1 0 001-1V7a1 1 0 00-1-1zM8 11a1.5 1.5 0 110-3 1.5 1.5 0 010 3zM10 6H6V4.5a2 2 0 114 0V6z" fill="#94a3b8"/></svg>
          <input type="password" id="password" placeholder="Enter password">
        </div>
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn">
        <span>Sign In</span>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div id="login-error" class="error"></div>
    </form>
    <div id="version-display" class="version"></div>
  </div>

  <!-- Timer Screen -->
  <div id="timer-screen" class="screen">
    <div class="header">
      <div class="header-left">
        <div class="user-avatar" id="user-avatar">U</div>
        <div>
          <span class="user-name" id="display-name"></span>
          <div class="recording-indicator" id="recording-indicator" style="display:none">
            <span class="rec-dot"></span> Recording
          </div>
        </div>
      </div>
      <button class="btn-link" id="logout-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 14H3.5A1.5 1.5 0 012 12.5v-9A1.5 1.5 0 013.5 2H6m4 9l3-3-3-3m3 3H6" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="timer-card">
      <div class="timer-display" id="timer-display">00:00:00</div>
      <div class="timer-status" id="timer-status">Ready to work</div>
    </div>

    <div class="input-group">
      <label>Work Date</label>
      <select id="work-date"></select>
    </div>

    <div class="controls">
      <button class="btn btn-start" id="start-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><polygon points="5,3 15,9 5,15" fill="currentColor"/></svg>
        <span>Start</span>
      </button>
      <button class="btn btn-stop" id="stop-btn" style="display:none">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="4" y="4" width="10" height="10" rx="2" fill="currentColor"/></svg>
        <span>Stop</span>
      </button>
    </div>

    <div class="upload-status" id="upload-status"></div>

    <div class="bottom-links">
      <a href="#" id="dashboard-link" class="dashboard-link">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 2h5v5H2V2zm7 0h5v5H9V2zM2 9h5v5H2V9zm7 0h5v5H9V9z" stroke="currentColor" stroke-width="1.2"/></svg>
        <span>Open Dashboard</span>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 1h7v7M11 1L4.5 7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </a>
      <div id="update-status" class="update-hint"></div>
    </div>
  </div>

  <!-- Update Overlay -->
  <div id="update-overlay" style="display:none">
    <div class="logo-icon">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="#2563eb"/>
        <path d="M20 10C14.48 10 10 14.48 10 20s4.48 10 10 10 10-4.48 10-10S25.52 10 20 10zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H19v6l5.25 3.15.75-1.23-4.5-2.67V15z" fill="white"/>
      </svg>
    </div>
    <div class="update-title">Updating TimeDOC</div>
    <div class="update-progress" id="update-progress">Checking for updates...</div>
    <div class="update-bar-bg"><div class="update-bar" id="update-bar"></div></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
